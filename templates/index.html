<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incipit Genie PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        .step-active { border-color: #3b82f6; color: #1d4ed8; }
        .step-inactive { border-color: #e5e7eb; color: #9ca3af; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <nav class="glass-panel sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg shadow-lg">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-600">
                        Incipit Genie PRO
                    </h1>
                    <p class="text-xs text-slate-500 font-medium tracking-wide">CITATION TRANSFORMER</p>
                </div>
            </div>
            <button onclick="resetApp()" class="text-sm text-slate-500 hover:text-red-500 transition-colors">
                <i class="fa-solid fa-rotate-left mr-1"></i> Reset
            </button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-10">
        
        <div id="upload-section" class="mb-8 transition-all duration-500">
            <div class="glass-panel rounded-2xl p-10 text-center border-2 border-dashed border-slate-300 hover:border-blue-400 transition-all cursor-pointer group"
                 onclick="document.getElementById('file-input').click()"
                 ondragover="event.preventDefault()" 
                 ondrop="handleDrop(event)">
                
                <input type="file" id="file-input" class="hidden" accept=".docx" onchange="handleFileSelect(event)">
                
                <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl"></i>
                </div>
                <h3 class="text-xl font-semibold mb-2">Upload Document</h3>
                <p class="text-slate-500">Drag & drop your .docx file here or click to browse</p>
            </div>
        </div>

        <div id="settings-section" class="hidden opacity-0 transition-all duration-500">
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-file-word text-xl"></i>
                    </div>
                    <div>
                        <h3 id="filename-display" class="font-semibold text-slate-900">document.docx</h3>
                        <p id="citation-count" class="text-sm text-slate-500">Loading citations...</p>
                    </div>
                </div>
                <div class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold uppercase rounded-full tracking-wider">
                    Ready
                </div>
            </div>

            <div class="glass-panel rounded-xl p-6 mb-8 border-l-4 border-blue-500">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-slate-400"></i> Incipit Settings
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Length (Words)</label>
                        <div class="flex items-center gap-4">
                            <input type="range" id="word-count" min="1" max="20" value="5" 
                                   class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                   oninput="document.getElementById('word-val').innerText = this.value">
                            <span id="word-val" class="text-lg font-bold text-blue-600 w-8">5</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-2">Truncates citations to the first N words.</p>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Formatting Style</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="style" value="none" class="peer hidden" checked>
                                <div class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 transition-all text-center">
                                    Normal
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="style" value="italic" class="peer hidden">
                                <div class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium italic peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 transition-all text-center">
                                    Italic
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="style" value="bold" class="peer hidden">
                                <div class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-bold peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 transition-all text-center">
                                    Bold
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="style" value="bold_italic" class="peer hidden">
                                <div class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-bold italic peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 transition-all text-center">
                                    Both
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="transformCitations()" id="transform-btn"
                    class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl font-bold shadow-lg shadow-blue-500/30 transform transition-all hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2">
                <span>Transform to Incipits</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>

            <div id="download-section" class="hidden mt-6 text-center animate-fade-in">
                <a href="/download" class="inline-flex items-center gap-2 px-8 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow-md transition-colors">
                    <i class="fa-solid fa-download"></i> Download Modified File
                </a>
                <p class="mt-2 text-sm text-green-600 font-medium">Transformation Complete!</p>
            </div>
        </div>

        <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 hidden flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <h3 class="text-xl font-semibold text-slate-700">Working magic...</h3>
            </div>
        </div>

    </main>

    <script>
        function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) await uploadFile(file);
        }

        function handleDrop(event) {
            event.preventDefault();
            const file = event.dataTransfer.files[0];
            if (file) uploadFile(file);
        }

        async function uploadFile(file) {
            showLoader();
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.success) {
                    document.getElementById('upload-section').classList.add('hidden');
                    document.getElementById('settings-section').classList.remove('hidden');
                    document.getElementById('settings-section').classList.remove('opacity-0');
                    
                    document.getElementById('filename-display').innerText = file.name;
                    document.getElementById('citation-count').innerText = `${data.count} Citations detected`;
                } else {
                    alert(data.error);
                }
            } catch (e) {
                alert('Upload failed');
            } finally {
                hideLoader();
            }
        }

        async function transformCitations() {
            showLoader();
            
            const wordCount = document.getElementById('word-count').value;
            const style = document.querySelector('input[name="style"]:checked').value;

            try {
                const response = await fetch('/transform', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        word_count: parseInt(wordCount),
                        style: style 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('transform-btn').classList.add('hidden');
                    document.getElementById('download-section').classList.remove('hidden');
                } else {
                    alert('Transformation failed: ' + data.error);
                }
            } catch (e) {
                alert('Error connecting to server');
            } finally {
                hideLoader();
            }
        }

        async function resetApp() {
            await fetch('/reset', { method: 'POST' });
            window.location.reload();
        }
    </script>
</body>
</html>
